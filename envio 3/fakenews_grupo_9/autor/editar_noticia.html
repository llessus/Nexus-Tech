<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Notícia - Fake News</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo-link">
                <div style="background: var(--accent-color); padding: 0.5rem; border-radius: 8px;">FN</div>
                Painel do Autor
            </a>
            <div class="nav-links">
                <a href="perfil.html">Meu Perfil</a>
                <a href="minhas_noticias.html">Minhas Notícias</a>
                <a href="../index.html" class="btn btn-secondary">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Editar Notícia</h1>
            <a href="minhas_noticias.html" class="btn btn-secondary">Voltar</a>
        </div>

        <form action="minhas_noticias.html" method="GET" class="auth-card" style="max-width: 100%; text-align: left;">
            <div class="form-group">
                <label>Título da Manchete</label>
                <input type="text" class="form-control" value="Céu de Brasília é tombado como patrimônio imaterial da procrastinação contemplativa" required>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Tag (Categoria)</label>
                    <select class="form-control" required>
                        <option value="">Selecione...</option>
                        <option value="Politica">Política</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Economia">Economia</option>
                        <option value="Cotidiano" selected>Cotidiano</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Estado Referente (UF)</label>
                    <select class="form-control">
                        <option value="BR">Nacional (Brasil)</option>
                        <option value="DF" selected>DF</option>
                        <option value="SP">SP</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Status Atual</label>
                <input type="text" class="form-control" value="Publicada" disabled style="opacity: 0.7;">
                <small style="color: var(--warning); display: block; margin-top: 0.5rem;">Aviso: Editar uma notícia publicada mudará o status dela novamente para 'Revisão Pendente'.</small>
            </div>

            <div class="form-group">
                <label>Conteúdo da Notícia</label>
                <textarea class="form-control" rows="8" required>Iphan decide que olhar fixamente para as nuvens em um fim de tarde deve se tornar direito trabalhista obrigatório para todos os moradores do planalto central...</textarea>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button type="submit" class="btn btn-primary">Salvar Alterações e Reenviar</button>
            </div>
        </form>
    </main>
</body>
</html>
