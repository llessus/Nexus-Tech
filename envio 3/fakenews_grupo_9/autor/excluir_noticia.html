<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Notícia - Autor - Fake News</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> .delete-card { max-width: 500px; margin: 5rem auto; background: var(--bg-secondary); padding: 3rem; border-radius: 1rem; border: 1px solid var(--danger); text-align: center; } .warning-icon { font-size: 4rem; color: var(--danger); margin-bottom: 1.5rem; }</style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo-link">
                <img src="../assets/images/logo.png" class="logo-img" alt="Logo">
                Painel do Autor
            </a>
            <div class="nav-links">
                <a href="minhas_noticias.html" class="active">Minhas Notícias</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="delete-card">
            <div class="warning-icon">
                <i class="fas fa-trash-alt"></i>
            </div>
            <h2 style="margin-bottom: 1rem;">Cuidado!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Você tem certeza que deseja apagar a notícia:<br>
                <strong>"Candidato promete construir ponte..."</strong>?<br>
                Esta ação é permanente.
            </p>
            
            <form onsubmit="event.preventDefault(); alert('Notícia apagada!'); window.location.href='minhas_noticias.html';">
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button type="submit" class="btn btn-danger" style="flex: 1;">Apagar Definitivamente</button>
                    <a href="minhas_noticias.html" class="btn btn-secondary" style="flex: 1;">Não, manter notícia</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
