<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Leitor - Fake News</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo-link">
                <img src="../assets/images/logo.png" class="logo-img" alt="Logo">
                Painel do Leitor
            </a>
            <div class="nav-links">
                <a href="perfil.html" class="active">Meu Perfil</a>
                <a href="../index.html" class="btn btn-secondary">Voltar para Home</a>
            </div>
        </div>
    </nav>

    <main class="container" style="max-width: 800px;">
        <div class="page-header">
            <h1 class="page-title">Configurações de Perfil (Leitor)</h1>
        </div>

        <div class="auth-card" style="max-width: 100%; border: none; padding: 0;">
            <div style="display: flex; gap: 2rem; align-items: flex-start;">
                
                <div style="text-align: center;">
                    <img src="https://ui-avatars.com/api/?name=Leitor+Curioso&background=10B981&color=fff&size=200" alt="Sua Foto" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 4px solid var(--border-color);">
                    <br>
                    <button class="btn btn-secondary btn-sm" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Alterar Foto</button>
                </div>

                <form onsubmit="event.preventDefault(); alert('Perfil salvo!');" style="flex: 1;">
                    <div class="form-group">
                        <label>Nome Público</label>
                        <input type="text" class="form-control" value="Leitor Curioso">
                    </div>
                    
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" class="form-control" value="leitor@fakenews.com.br" readonly style="opacity: 0.7;">
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>UF Preferida (para filtros na Home)</label>
                            <select class="form-control">
                                <option value="DF" selected>Distrito Federal</option>
                                <option value="SP">São Paulo</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </div>
                </form>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 3rem 0;">
            
            <h2 style="margin-bottom: 1rem;">Meus Comentários Recentes</h2>
            
            <div class="comment-section" style="margin-top: 0;">
                <div class="comment" style="padding-top: 0;">
                    <div class="comment-content">
                        <strong>Em: <a href="../publico/detalhe_noticia.html">Brasília ganha praia artificial...</a></strong>
                        <div class="comment-date">Há 2 dias</div>
                        <p style="color: var(--text-secondary);">Isso explica para onde foi meu IPVA!</p>
                        <div style="margin-top: 0.5rem;">
                            <!-- Botão de Apagar Comentário no fluxo do Leitor -->
                            <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; color: var(--danger); border-color: var(--danger);" onclick="confirm('Apagar comentário?')">Excluir Comentário</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
