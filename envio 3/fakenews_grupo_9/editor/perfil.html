<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Editor - Fake News</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="logo-link">
                <div style="background: var(--warning); padding: 0.5rem; border-radius: 8px; color: #000;">FN</div>
                Painel do Editor
            </a>
            <div class="nav-links">
                <a href="painel.html">Painel Principal</a>
                <a href="perfil.html" class="active">Meu Perfil</a>
                <a href="../index.html" class="btn btn-secondary">Sair</a>
            </div>
        </div>
    </nav>

    <main class="container" style="max-width: 800px;">
        <div class="page-header">
            <h1 class="page-title">Configurações de Perfil</h1>
        </div>

        <div class="auth-card" style="max-width: 100%; border: none; padding: 0;">
            <div style="display: flex; gap: 2rem; align-items: flex-start;">
                <div style="text-align: center;">
                    <img src="https://ui-avatars.com/api/?name=Editor+Chefe&background=F59E0B&color=fff&size=200" alt="Sua Foto" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 4px solid var(--border-color);">
                </div>

                <form onsubmit="event.preventDefault(); alert('Perfil atualizado!');" style="flex: 1;">
                    <div class="form-group">
                        <label>Nome Público</label>
                        <input type="text" class="form-control" value="Editor Chefe">
                    </div>
                    
                    <div class="form-group">
                        <label>E-mail (Login)</label>
                        <input type="email" class="form-control" value="editor@fakenews.com.br" readonly style="opacity: 0.7; cursor: not-allowed;">
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
