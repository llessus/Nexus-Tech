<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibir Tag - Superadmin</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>.admin-nav{background-color:var(--danger)}.admin-nav .logo-link{color:white} .detail-card { max-width: 500px; margin: 0 auto; background: var(--bg-secondary); padding: 2.5rem; border-radius: 1rem; border: 1px solid var(--border-color); }</style>
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="navbar-container">
            <a href="dashboard.html" class="logo-link"><img src="../assets/images/logo.png" class="logo-img" alt="Logo">Superadmin</a>
            <div class="nav-links"><a href="dashboard.html" style="color:white;">Dashboard</a></div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Detalhes da Tag</h1>
            <div style="display: flex; gap: 1rem;">
                <a href="tags_edit.html?id=1" class="btn btn-primary"><i class="fas fa-edit"></i> Editar</a>
                <a href="tags_list.html" class="btn btn-secondary">Voltar</a>
            </div>
        </div>

        <div class="detail-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="tag" style="font-size: 2rem; padding: 0.5rem 2rem;">Política</span>
            </div>
            
            <div style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                <label style="font-size: 0.8rem; color: var(--text-muted);">ID</label>
                <div style="font-weight: 500;">#1</div>
            </div>
            <div>
                <label style="font-size: 0.8rem; color: var(--text-muted);">NOTÍCIAS RELACIONADAS</label>
                <div style="font-weight: 500;">42 notícias utilizam esta tag.</div>
            </div>
        </div>
    </main>
</body>
</html>
