<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - Superadmin</title>
    <link rel="stylesheet" href="../assets/css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>.admin-nav{background-color:var(--danger)}.admin-nav .logo-link{color:white} .form-card { max-width: 600px; margin: 0 auto; background: var(--bg-secondary); padding: 2rem; border-radius: 1rem; border: 1px solid var(--border-color); }</style>
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="navbar-container">
            <a href="dashboard.html" class="logo-link"><img src="../assets/images/logo.png" class="logo-img" alt="Logo">Superadmin</a>
            <div class="nav-links"><a href="dashboard.html" style="color:white;">Dashboard</a></div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Editar Usuário #1</h1>
            <a href="usuarios_list.html" class="btn btn-secondary">Cancelar</a>
        </div>

        <div class="form-card">
            <div style="background: rgba(59, 130, 246, 0.1); padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; border-left: 4px solid var(--accent-color);">
                <p style="font-size: 0.9rem; color: var(--accent-color);">Você está editando o perfil de <strong>João Silva</strong>.</p>
            </div>
            
            <form onsubmit="event.preventDefault(); alert('Usuário atualizado com sucesso!'); window.location.href='usuarios_list.html';">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" class="form-control" value="João Silva" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="form-control" value="joao@exemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Nova Senha (deixe em branco para manter)</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Perfil de Acesso</label>
                    <select class="form-control">
                        <option value="leitor" selected>Leitor</option>
                        <option value="autor">Autor</option>
                        <option value="editor">Editor</option>
                        <option value="superadmin">Superadmin</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;"><i class="fas fa-save"></i> Salvar Alterações</button>
                    <a href="usuarios_list.html" class="btn btn-secondary" style="flex: 1;">Voltar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
